<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG vs AI Agent Comparison</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f7fa;
      --panel-bg: #ffffff;
      --border: #e2e8f0;
      --accent: #3d5afe;
      --accent2: #7c4dff;
      --accent-glow: rgba(61, 90, 254, 0.18);
      --text: #0f172a;
      --text-muted: #5c6b80;
      --radius: 12px;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    h1 { text-align: center; margin: 24px 0; font-weight: 600; }
    .container { max-width: 960px; margin: 0 auto; width: 100%; padding: 0 16px; }
    .input-area { display: flex; gap: 8px; margin-bottom: 24px; }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
    }
    .input-area button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.1s;
    }
    .input-area button:hover { transform: translateY(-2px); }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .panels.compare { grid-template-columns: repeat(3,1fr); }
    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
    }
    .panel h2 { margin: 0 0 12px; font-size: 16px; font-weight: 500; color: var(--text-muted); }
    .answer { flex: 1; overflow-y: auto; white-space: pre-wrap; }
    .loading { opacity: 0.6; font-style: italic; }
    @media (max-width: 600px) {
      .panels { grid-template-columns: 1fr; }
    }
    /* subtle pulse animation for new answer */
    @keyframes pulseAnswer {
      0% { box-shadow: 0 0 0 0 rgba(61,90,254,0.2); }
      70% { box-shadow: 0 0 0 6px rgba(61,90,254,0); }
      100% { box-shadow: 0 0 0 0 rgba(61,90,254,0); }
    }
    .dark {
      --bg: #1a1e2b;
      --panel-bg: #2d3349;
      --border: #3a416a;
      --accent: #8c9eff;
      --accent2: #b3bfff;
      --accent-glow: rgba(140, 158, 255, 0.18);
      --text: #e0e7ff;
      --text-muted: #a0aec0;
    }

  </style>
</head>
<body>
    <div class="topbar">
      <div class="topbar-title">RAG vs AI Agent</div>
      <div>
        <button id="darkModeToggle" class="btn btn-ghost">🌙</button>
        <a href="/" class="btn btn-ghost" style="margin-left:8px;">Home</a>
        <a href="/about" class="btn btn-ghost" style="margin-left:8px;">About</a>
      </div>
    </div>
    <h1>RAG vs AI Agent Comparison</h1>
  <div class="container">

    <div class="input-area">
      <input type="text" id="query" placeholder="Enter your question..." />
      <label style="margin-left:8px; font-size:14px; color:var(--text-muted);">
        <input type="checkbox" id="compareMode" /> Comparison mode
      </label>
      <select id="modeSelect" style="margin-left:8px; font-size:14px;">
        <option value="rag">RAG Only</option>
        <option value="agent">AI Agent Only</option>
        <option value="coding">Coding Agent (Python)</option>
      </select>
      <button id="searchBtn">Search</button>
    </div>
    <div class="panels" id="panelsContainer">
      <div class="panel" id="ragPanel">
        <h2>Context (RAG) Answer</h2>
        <div class="answer loading" id="ragAnswer">Enter a query and press Search.</div>
      </div>
      <div class="panel" id="agentPanel">
        <h2 id="agentPanelTitle">AI Agent Answer</h2>
        <div class="answer loading" id="agentAnswer">Enter a query and press Search.</div>
      </div>
      <div class="panel compare-panel" id="comparePanel" style="display:none;">
        <h2>Comparison</h2>
        <div class="answer loading" id="compareAnswer">Enter a query and press Search.</div>
      </div>
    </div>
  </div>

  <script>
    // Dark mode handling
    const darkModeToggle = document.getElementById('darkModeToggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      document.body.classList.add('dark');
      darkModeToggle.textContent = '☀️';
    }
    darkModeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      darkModeToggle.textContent = isDark ? '☀️' : '🌙';
    });

    const queryInput = document.getElementById('query');
    const modeSelect = document.getElementById('modeSelect');
    const ragAnswerDiv = document.getElementById('ragAnswer');
    const agentAnswerDiv = document.getElementById('agentAnswer');
    const ragPanel = document.getElementById('ragPanel');
    const agentPanel = document.getElementById('agentPanel');
    const compareModeCheckbox = document.getElementById('compareMode');
    const comparePanel = document.getElementById('comparePanel');
    const panelsContainer = document.getElementById('panelsContainer');
    const compareAnswerDiv = document.getElementById('compareAnswer');
    const agentPanelTitle = document.getElementById('agentPanelTitle');

    async function fetchAnswer(agent, query) {
      const payload = { query, agent };
      try {
        const resp = await fetch('/delegate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!resp.ok) {
          const errText = await resp.text();
          console.error('Fetch error:', resp.status, errText);
          return `Error ${resp.status}: ${errText}`;
        }
        const data = await resp.json();
        return data.answer || 'No answer returned.';
      } catch (e) {
        console.error('Fetch exception:', e);
        return 'Network error: ' + (e.message || e);
      }
    }

    function setLoading(el) { el.textContent = 'Loading…'; el.classList.add('loading'); }
    function setAnswer(el, text) { el.textContent = text; el.classList.remove('loading'); }

    // Helper to show/hide panels based on mode selection
    function updatePanelVisibility() {
      const mode = modeSelect.value; // 'rag', 'agent', or 'coding'
      agentPanelTitle.textContent = mode === 'coding'
        ? 'Coding Agent Answer'
        : 'AI Agent Answer';
      if (compareModeCheckbox.checked) {
        // Comparison mode: show both panels and comparison panel
        ragPanel.style.display = 'flex';
        agentPanel.style.display = 'flex';
        comparePanel.style.display = 'flex';
        panelsContainer.classList.add('compare');
      } else {
        // Normal mode: show only selected panel
        panelsContainer.classList.remove('compare');
        comparePanel.style.display = 'none';
        if (mode === 'rag') {
          ragPanel.style.display = 'flex';
          agentPanel.style.display = 'none';
        } else {
          ragPanel.style.display = 'none';
          agentPanel.style.display = 'flex';
        }
      }
    }

    // Update visibility when checkbox or mode selection changes
    compareModeCheckbox.addEventListener('change', () => {
      updatePanelVisibility();
    });
    modeSelect.addEventListener('change', () => {
      updatePanelVisibility();
    });

    // Initial visibility setup
    updatePanelVisibility();

    searchBtn.addEventListener('click', async () => {
      const query = queryInput.value.trim();
      if (!query) return;
      const mode = modeSelect.value;
      // Reset loading states based on visible panels
      if (compareModeCheckbox.checked) {
        setLoading(ragAnswerDiv);
        setLoading(agentAnswerDiv);
        setLoading(compareAnswerDiv);
      } else if (mode === 'rag') {
        setLoading(ragAnswerDiv);
        // Clear hidden panels' content
        setAnswer(agentAnswerDiv, "");
        setAnswer(compareAnswerDiv, "");
      } else {
        setLoading(agentAnswerDiv);
        setAnswer(ragAnswerDiv, "");
        setAnswer(compareAnswerDiv, "");
      }

      // Remove any animation class first
      ragPanel.classList.remove('updated');
      agentPanel.classList.remove('updated');
      comparePanel.classList.remove('updated');
        try {
          if (compareModeCheckbox.checked) {
            const [ragAns, agentAns] = await Promise.all([
              fetchAnswer('rag', query),
              fetchAnswer('agent', query)
            ]);
            setAnswer(ragAnswerDiv, ragAns);
            setAnswer(agentAnswerDiv, agentAns);
            setAnswer(compareAnswerDiv, `RAG: ${ragAns}\n\nAI Agent: ${agentAns}`);
            ragPanel.classList.add('updated');
            agentPanel.classList.add('updated');
            comparePanel.classList.add('updated');
          } else {
            if (mode === 'rag') {
              const ragAns = await fetchAnswer('rag', query);
              setAnswer(ragAnswerDiv, ragAns);
              ragPanel.classList.add('updated');
            } else {
              const agentType = mode === 'coding' ? 'coding' : 'agent';
              const agentAns = await fetchAnswer(agentType, query);
              setAnswer(agentAnswerDiv, agentAns);
              agentPanel.classList.add('updated');
            }
          }
        } catch (e) {
          const errMsg = 'Error: ' + (e.message || e);
          setAnswer(ragAnswerDiv, errMsg);
          setAnswer(agentAnswerDiv, errMsg);
          setAnswer(compareAnswerDiv, errMsg);
        }
    });
  </script>
</body>
</html>
