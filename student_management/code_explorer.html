<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Query Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet" />
  <style>
    :root {--bg:#0f172a;--panel:#1e293b;--border:#334155;--accent:#6366f1;--text:#f8fafc;--muted:#94a3b8;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);padding:2rem}
    a{color:var(--accent);text-decoration:none}
    .grid{display:grid;grid-template-columns:280px 1fr;gap:1.5rem;margin-top:1.5rem}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
    .file{display:flex;justify-content:space-between;align-items:center;padding:.6rem .75rem;border:1px solid var(--border);border-radius:8px;margin-bottom:.5rem;font-family:'Fira Code',monospace;font-size:.85rem}
    button{background:var(--accent);color:#fff;border:none;padding:.45rem .8rem;border-radius:6px;cursor:pointer;font-weight:600}
    input,textarea{width:100%;background:#020617;border:1px solid var(--border);border-radius:8px;padding:.75rem;color:var(--text);font-family:'Fira Code',monospace}
    textarea{height:180px;margin-top:.5rem}
    label{font-size:.85rem;color:var(--muted);display:block;margin-top:.75rem}
    pre{background:#020617;border:1px solid var(--border);border-radius:8px;padding:1rem;min-height:120px;white-space:pre-wrap;font-family:'Fira Code',monospace;color:#38bdf8}
  </style>
</head>
<body>
  <h1>Query Explorer</h1>
  <p style="color:var(--muted);margin-top:.5rem">Run CRUD query files from <code>student_management/queries/</code> · <a href="/code">Code Generator</a> · <a href="/api/students/docs">FastAPI Docs</a></p>
  <div class="grid">
    <div class="card">
      <h3>Query Files</h3>
      <ul id="fileList" style="list-style:none;margin-top:1rem"></ul>
    </div>
    <div class="card">
      <h3>Save Query</h3>
      <label>Filename</label>
      <input id="filename" placeholder="my_query.py" />
      <label>Python code</label>
      <textarea id="code" placeholder="def create_record(conn, student_id, course, grade): ..."></textarea>
      <button style="margin-top:1rem" onclick="uploadCode()">Save File</button>
      <h3 style="margin-top:1.5rem">Console</h3>
      <pre id="console">Select a file and click Run.</pre>
    </div>
  </div>
  <script>
    const API = '/api/students';
    async function loadFiles() {
      const files = await (await fetch(API + '/queries')).json();
      document.getElementById('fileList').innerHTML = files.length
        ? files.map(f => `<li class="file"><span>${f}</span><button onclick="runCode('${f}')">Run</button></li>`).join('')
        : '<li style="color:var(--muted)">No query files yet</li>';
    }
    async function uploadCode() {
      const filename = document.getElementById('filename').value;
      const code = document.getElementById('code').value;
      if (!filename || !code) return alert('Enter filename and code');
      const r = await fetch(API + '/queries', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({filename, code}) });
      const d = await r.json();
      alert(d.message || d.detail || 'Saved');
      loadFiles();
    }
    async function runCode(filename) {
      const box = document.getElementById('console');
      box.textContent = 'Running ' + filename + '...';
      const r = await fetch(API + '/queries/' + encodeURIComponent(filename) + '/run', { method:'POST' });
      const d = await r.json();
      box.textContent = d.output || d.detail || JSON.stringify(d);
    }
    loadFiles();
  </script>
</body>
</html>
