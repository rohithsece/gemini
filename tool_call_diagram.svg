<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <style>
    .bg { fill: #0b1220; }
    .card { fill: #1f2a44; stroke: #5a76bf; stroke-width: 2; rx: 16; }
    .title { fill: #ffffff; font-family: Inter, sans-serif; font-size: 22px; font-weight: 700; }
    .label { fill: #c7d2ff; font-family: Inter, sans-serif; font-size: 16px; }
    .value { fill: #f8fafc; font-family: Inter, sans-serif; font-size: 14px; }
    .arrow { stroke: #7c9cff; stroke-width: 3; marker-end: url(#arrowhead); }
  </style>
  <rect class="bg" x="0" y="0" width="800" height="520" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c9cff" />
    </marker>
  </defs>
  <text x="40" y="46" class="title">Tool Call Flow: Current Assistant Session</text>
  <rect class="card" x="40" y="80" width="330" height="160" />
  <text x="70" y="120" class="label">Assistant</text>
  <text x="70" y="150" class="value">Receives user request</text>
  <text x="70" y="175" class="value">Decides tool to use</text>
  <rect class="card" x="430" y="80" width="330" height="160" />
  <text x="460" y="120" class="label">Tool Namespace</text>
  <text x="460" y="150" class="value">functions.create_file</text>
  <text x="460" y="175" class="value">functions.read_file</text>
  <text x="460" y="200" class="value">functions.replace_string_in_file</text>
  <line x1="370" y1="160" x2="430" y2="160" class="arrow" />
  <rect class="card" x="40" y="280" width="720" height="180" />
  <text x="70" y="320" class="label">Tool Call Example</text>
  <text x="70" y="350" class="value">Namespace: functions</text>
  <text x="70" y="375" class="value">Tool: create_file</text>
  <text x="70" y="400" class="value">Input: {{ filePath, content }}</text>
  <text x="70" y="425" class="value">Output: New file created in workspace</text>
  <text x="70" y="455" class="value">Additional: Calls may be parallelized if independent</text>
</svg>